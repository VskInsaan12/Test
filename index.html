<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will you be my Valentine?</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9e6ea;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      position: relative;
      background-image: url('https://i.pinimg.com/736x/d0/2f/44/d02f4410694d1ad27f3b923b83120c46.jpg');
      background-blend-mode: overlay;
    }
    h1 {
      color: #ff4d6b;
    }
    #flowers {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }
    .flower {
      position: absolute;
      width: 50px;
      height: 50px;
      background-image: url('https://example.com/flower-image.jpg'); /* Change to your flower image URL */
      background-size: cover;
      animation: flower 1s ease-out;
    }
    #noButton {
      position: absolute;
      transition: transform 0.5s;
    }
    #buttons {
      margin-top: 20px;
    }
    button {
      font-size: 18px;
      padding: 10px 20px;
      margin: 0 10px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
    }
    #yesButton {
      background-color: #ff4d6b;
      color: white;
      font-size: 24px;
      transition: transform 0.5s;
    }
    #yesButton:hover {
      transform: scale(1.2);
    }
    #noButton {
      background-color: #ff4d6b;
      color: white;
      font-size: 24px;
    }
    
    @keyframes flower {
      0% {
        transform: scale(0.8);
        opacity: 1;
      }
      50% {
        transform: scale(1.2);
        opacity: 0.5;
      }
      100% {
        transform: scale(0.8);
        opacity: 0;
      }
    }
    .heart {
      position: absolute;
      width: 50px;
      height: 50px;
      background-image: url('https://pics.craiyon.com/2023-05-25/7edf27cb27844221b7079153e6bd9756.webp');
      background-size: cover;
      animation: heart 1s ease-out;
    }
  </style>
</head>
<body>
  <div>
    <h1>Will you be my Valentine, Raj?</h1>
    <div id="flowers">
        <img src="wow.webp" alt="flowers" hidden>
        <!-- Place your flowers background here, you can use an image or CSS patterns -->
      </div>
    <div id="buttons">
      <button id="yesButton" onclick="showMessage()">Yes</button>
      <button id="noButton" onmouseover="moveButton()">No</button>
    </div>
  </div>

  <script>
   function showMessage() {
      const message = "I Love you Hubby!";
      const alertBox = document.createElement('div');
      alertBox.style.position = 'fixed';
      alertBox.style.top = '50%';
      alertBox.style.left = '50%';
      alertBox.style.transform = 'translate(-50%, -50%)';
      alertBox.style.backgroundColor = 'rgba(255, 255, 255, 0.8)';
      alertBox.style.padding = '20px';
      alertBox.style.borderRadius = '10px';
      alertBox.style.boxShadow = '0 0 10px rgba(0, 0, 0, 0.2)';
      alertBox.textContent = message;
      document.body.appendChild(alertBox);

      createFlowers();
    }
    function moveButton() {
      const button = document.getElementById('noButton');
      const newX = Math.random() * (window.innerWidth - 150);
      const newY = Math.random() * (window.innerHeight - 50);
      button.style.left = `${newX}px`;
      button.style.top = `${newY}px`;
    }
    function createFlowers() {
      for (let i = 0; i < 10; i++) {
        const flower = document.createElement('div');
        flower.classList.add('flower');
        flower.style.left = `${Math.random() * window.innerWidth}px`;
        flower.style.top = `${Math.random() * window.innerHeight}px`;
        document.body.appendChild(flower);
        setTimeout(() => {
          flower.remove();
        }, 1000);
      }
    }
    function changeBackgroundToFlowers() {
      document.body.style.backgroundImage = "url('https://wallpapers.com/images/hd/minimalist-aesthetic-drawing-flowers-vcd5s4fuwehbd03g.jpg')";
      document.body.style.backgroundBlendMode = 'overlay';
    }
  </script>
</body>
</html>
